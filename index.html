<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Be'er Sheva Traffic Lights Graph</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <div>
          <h1>Be'er Sheva Graph Map</h1>
          <p id="status">Loading map data...</p>
        </div>

        <section class="stats" aria-label="Map statistics">
          <div><span id="nodeCount">-</span><label>graph nodes</label></div>
          <div><span id="roadCount">-</span><label>directed edges</label></div>
          <div><span id="lightCount">-</span><label>traffic lights</label></div>
          <div><span id="matchedCount">-</span><label>matched lights</label></div>
          <div><span id="signalNodeCount">-</span><label>signal nodes</label></div>
          <div><span id="outsideCount">-</span><label>unmatched lights</label></div>
        </section>

        <section class="controls" aria-label="Map controls">
          <button id="fitRoads" type="button">Fit Roads</button>
          <button id="fitAll" type="button">Fit All</button>
          <label class="toggle">
            <input id="showNodes" type="checkbox" checked>
            Show graph nodes
          </label>
          <label class="toggle">
            <input id="showUnmatched" type="checkbox" checked>
            Show unmatched lights
          </label>
        </section>

        <section class="legend" aria-label="Map legend">
          <div><i class="road"></i> Generated directed roads</div>
          <div><i class="node"></i> Graph node</div>
          <div><i class="matched"></i> Matched traffic light</div>
          <div><i class="unmatched"></i> Unmatched traffic light</div>
        </section>
      </aside>

      <section class="map-wrap" aria-label="Map canvas">
        <canvas id="mapCanvas"></canvas>
      </section>
    </main>

    <script src="map.js"></script>
  </body>
</html>
